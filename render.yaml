services:
  - type: web
    name: appointment-system-server
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: appointment-db
          property: connectionString
      - key: JWT_SECRET
        sync: false

databases:
  - name: appointment-db
    databaseName: mqams
    user: postgres
